validate_data:
  raw_input_path: "data/raw/200k_Restaurants_Mostly_US.csv"
  validated_output_path: "data/validated/restaurants_validated.parquet"
  validation_report_path: "reports/data_validation_report.json"
  rating_column: "Rating"
  latitude_column: "Latitude"
  longitude_column: "Longitude"
  min_rating: 0.0
  max_rating: 5.0

prepare:
  validated_input_path: "data/validated/restaurants_validated.parquet"
  processed_dir: "data/processed"
  test_size: 0.15
  validation_size: 0.15
  seed: 42
  positive_rating_threshold: 4.0

feature_engineering:
  processed_dir: "data/processed"
  features_dir: "data/features"
  feature_report_path: "reports/feature_summary.json"
  top_category_count: 20


train:
  experiment_name: "Restaurant_Metadata_Ranking_Classifier"
  run_name: "baseline_rf_100_depth10"
  model_type: "random_forest"
  n_estimators: 200
  max_depth: 10
  min_samples_split: 2
  class_weight: "balanced"
  model_path: "models/restaurant_classifier.pkl"
  tracking_uri: "sqlite:///mlflow.db"

evaluate:
  metrics_path: "metrics.json"
  classification_report_path: "reports/classification_report.json"
  confusion_matrix_path: "reports/confusion_matrix.png"
  roc_curve_path: "reports/roc_curve.png"
  precision_recall_curve_path: "reports/precision_recall_curve.png"